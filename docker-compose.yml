services:
  db:
    image: postgres:16
    container_name: restaurant_ops_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: restaurant
      POSTGRES_PASSWORD: restaurant
      POSTGRES_DB: restaurant_ops
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U restaurant -d restaurant_ops"]
      interval: 5s
      timeout: 5s
      retries: 10
volumes:
  pgdata:
